<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copas!</title>
    <style>
        /* --- Reset & Typography Dasar --- */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Container Utama (Kartu) --- */
        .main-card {
            width: 100%;
            max-width: 750px;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h2, h3 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 20px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        /* --- Tab Menu Styles --- */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }
        .tab-btn {
            background-color: #f1f3f9;
            color: #555;
            box-shadow: none;
            border-radius: 8px;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }
        .tab-konten {
            display: none;
            animation: fadeIn 0.4s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Form Styles --- */
        .form-group { 
            display: flex; 
            flex-direction: column; 
            margin-bottom: 20px; 
        }
        
        label { 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #555; 
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        select, input[type="text"], input[type="date"], input[type="number"] {
            padding: 12px 15px;
            border: 2px solid transparent; 
            background-color: #f1f3f9; 
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            transition: all 0.3s ease; 
            font-family: inherit;
        }

        select:focus, input:focus, textarea:focus {
            background-color: #fff;
            border-color: #667eea; 
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* --- Button Styles --- */
        .button-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 15px; 
        }
        button {
            flex: 1; 
            padding: 14px; 
            color: white; 
            border: none;
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active { transform: translateY(2px); }

        .btn-generate { background: linear-gradient(to right, #28a745, #20c997); box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        .btn-clear { background: linear-gradient(to right, #dc3545, #f86c6b); box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3); }
        .btn-copy { background: linear-gradient(to right, #007bff, #6610f2); box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3); }

        /* --- Output Area Styles --- */
        .output-group { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;}
        textarea { 
            width: 100%;
            height: 350px; 
            background-color: #2d3748; 
            color: #e2e8f0;
            font-family: 'Fira Code', 'Consolas', monospace; 
            font-size: 14px; 
            padding: 15px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            resize: vertical;
            line-height: 1.6;
        }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #2d3748; }
        textarea::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 4px;}

        /* --- Kalkulator Styles --- */
        .calc-box {
            background: #f1f3f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
        }
        .calc-box p { margin: 8px 0; font-size: 15px; color: #4a5568;}
        .calc-box strong { color: #2d3748; }
        
        .prorata-grid {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .prorata-card {
            flex: 1;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
        }
        .prorata-card h4 { margin-top: 0; color: #667eea; text-align: center;}
        .total-box {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            color: #155724;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.2);
        }
        .total-box h3 { margin: 0; color: #155724; }
    </style>
</head>
<body onload="sesuaikanForm()">

    <div class="main-card">
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="bukaTab(event, 'TabKIP')">KIP & DSC</button>
            <button class="tab-btn" onclick="bukaTab(event, 'TabKompulir')">Format Kompulir</button>
            <button class="tab-btn" onclick="bukaTab(event, 'TabKalkulator')">Kalkulator</button>
        </div>

        <div id="TabKIP" class="tab-konten" style="display: block;">
            <h2>Template KIP & DSC</h2>

            <div class="form-group">
                <label for="kategori">Pilih Kategori:</label>
                <select id="kategori" onchange="sesuaikanForm()">
                    <option value="template1">1. WSA TEKNIS / Kendala Internet</option>
                    <option value="template2">2. WSA NON TEKNIS / Percepatan Permintaan</option>
                    <option value="template3">3. GENERAL</option>
                    <option value="template4">4. NON WSA PROFILING / Edit SR</option>
                    <option value="template5">5. NON WSA BILLING</option>
                    <option value="template6">6. ITSD</option>
                    <option value="template7">7. Mobile Reguler</option>
                    <option value="template8">8. Mobile Network</option>
                    <option value="template9">9. Non Numbering / Kabel Terjuntai</option>
                </select>
            </div>

            <div class="form-group">
                <label for="inputPabx">Masukkan Data PABX / MSISDN-A:</label>
                <input type="text" id="inputPabx" placeholder="Ketik data PABX / MSISDN-A di sini">
            </div>

            <div class="form-group" id="grupTanggal">
                <label for="inputTanggal">Pilih Tanggal Kejadian:</label>
                <input type="date" id="inputTanggal">
            </div>

            <div class="button-group">
                <button onclick="buatTemplate()" class="btn-generate">Generate Teks</button>
                <button onclick="clearForm()" class="btn-clear">Clear Data</button>
            </div>

            <div class="output-group">
                <label for="hasilTeks">Hasil Template:</label>
                <textarea id="hasilTeks" readonly placeholder="Hasil format teks akan muncul di sini"></textarea>
                
                <div class="button-group">
                    <button onclick="copyTeks('hasilTeks')" class="btn-copy">Copy Hasil Teks</button>
                </div>
            </div>
        </div>

        <div id="TabKompulir" class="tab-konten">
            <h2>Format Kompulir</h2>
            
            <div class="form-group">
                <label for="kategoriKompulir">Pilih Format Template:</label>
                <select id="kategoriKompulir">
                    <option value="1">1. Update NIK</option>
                    <option value="2">2. Resend Link</option>
                    <option value="3">3. Adjust AHT</option>
                    <option value="4">4. Cek Insera</option>
                    <option value="5">5. Release Call</option>
                    <option value="6">6. Callback</option>
                </select>
            </div>

            <div class="button-group">
                <button onclick="getKompulir()" class="btn-generate">Get Template</button>
                <button onclick="clearKompulir()" class="btn-clear">Clear Data</button>
            </div>

            <div class="output-group">
                <label for="hasilKompulir">Hasil Template:</label>
                <textarea id="hasilKompulir" readonly placeholder="Hasil format kompulir akan muncul di sini"></textarea>
                
                <div class="button-group">
                    <button onclick="copyTeks('hasilKompulir')" class="btn-copy">Copy Hasil Teks</button>
                </div>
            </div>
        </div>

        <div id="TabKalkulator" class="tab-konten">
            <h2>Kalkulator PPN & Admin</h2>
            <div class="form-group">
                <label>Harga Paket Dasar (Tanpa Titik/Koma):</label>
                <input type="number" id="hargaDasar" placeholder="Contoh: 250000" oninput="hitungPPN()">
            </div>
            
            <div class="calc-box">
                <p>PPN 11% : <strong id="outPpn">Rp 0</strong></p>
                <p>Admin : <strong id="outAdmin">Rp 5.550</strong></p>
                <hr style="border: 0.5px solid #cbd5e0; margin: 10px 0;">
                <p style="font-size: 18px;">Total Harga : <strong id="outTotalHarga" style="color: #28a745;">Rp 0</strong></p>
            </div>

            <hr style="margin: 30px 0; border: 1px solid #e2e8f0;">

            <h2>Kalkulator Prorata</h2>
            <div class="prorata-grid">
                <div class="prorata-card">
                    <h4>Paket Lama</h4>
                    <div class="form-group">
                        <label>Harga (Inc. PPN+Admin):</label>
                        <input type="number" id="hargaLama" placeholder="Contoh: 283050">
                    </div>
                    <div class="form-group">
                        <label>Dari Tanggal:</label>
                        <input type="date" id="tglDariLama">
                    </div>
                    <div class="form-group">
                        <label>Sampai Tanggal:</label>
                        <input type="date" id="tglSampaiLama">
                    </div>
                    <p style="text-align: center; margin-bottom: 0;">Prorata: <strong id="outProrataLama" style="color: #dc3545;">Rp 0</strong></p>
                </div>

                <div class="prorata-card">
                    <h4>Paket Baru</h4>
                    <div class="form-group">
                        <label>Harga (Inc. PPN+Admin):</label>
                        <input type="number" id="hargaBaru" placeholder="Contoh: 260850">
                    </div>
                    <div class="form-group">
                        <label>Dari Tanggal:</label>
                        <input type="date" id="tglDariBaru">
                    </div>
                    <div class="form-group">
                        <label>Sampai Tanggal:</label>
                        <input type="date" id="tglSampaiBaru">
                    </div>
                    <p style="text-align: center; margin-bottom: 0;">Prorata: <strong id="outProrataBaru" style="color: #007bff;">Rp 0</strong></p>
                </div>
            </div>

            <div class="button-group" style="margin-top: 15px;">
                <button onclick="hitungProrata()" class="btn-copy">Hitung Prorata</button>
                <button onclick="clearKalkulator()" class="btn-clear">Clear Data</button>
            </div>

            <div class="total-box">
                <h3>Total Tagihan Akhir: <br><span id="outTotalProrata">Rp 0</span></h3>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // FUNGSI TAB NAVIGASI
        // ==========================================
        function bukaTab(evt, namaTab) {
            let i, tabkonten, tabbtn;
            tabkonten = document.getElementsByClassName("tab-konten");
            for (i = 0; i < tabkonten.length; i++) {
                tabkonten[i].style.display = "none";
            }
            tabbtn = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabbtn.length; i++) {
                tabbtn[i].className = tabbtn[i].className.replace(" active", "");
            }
            document.getElementById(namaTab).style.display = "block";
            evt.currentTarget.className += " active";
        }

        // ==========================================
        // FUNGSI TAB 1: KIP & DSC
        // ==========================================
        function sesuaikanForm() {
            const kategori = document.getElementById('kategori').value;
            const grupTanggal = document.getElementById('grupTanggal');
            const inputPabx = document.getElementById('inputPabx');
            const inputTanggal = document.getElementById('inputTanggal');

            inputPabx.value = '';
            inputTanggal.value = '';
            document.getElementById('hasilTeks').value = '';

            const butuhTanggal = ['template2', 'template3', 'template5', 'template6', 'template7', 'template8'];

            if (butuhTanggal.includes(kategori)) {
                grupTanggal.style.display = 'flex'; 
            } else {
                grupTanggal.style.display = 'none'; 
            }
            
            inputPabx.focus();
        }

        function buatTemplate() {
            const kategori = document.getElementById('kategori').value;
            const pabx = document.getElementById('inputPabx').value;
            const tanggalRaw = document.getElementById('inputTanggal').value;

            if(!pabx) {
                alert("Harap isi data PABX / MSISDN-A terlebih dahulu!");
                document.getElementById('inputPabx').focus();
                return;
            }

            const butuhTanggal = ['template2', 'template3', 'template5', 'template6', 'template7', 'template8'];
            if (butuhTanggal.includes(kategori) && !tanggalRaw) {
                alert("Harap isi Tanggal Kejadian terlebih dahulu!");
                document.getElementById('inputTanggal').focus();
                return;
            }

            let tanggalFormatted = "";
            if (tanggalRaw) {
                const parts = tanggalRaw.split('-');
                tanggalFormatted = `${parts[2]}-${parts[1]}-${parts[0]}`;
            }

            let template = "";

            if (kategori === 'template1') {
                template = `${pabx} / CASE\n\n${pabx} / NoIH / Case / HVC\nNama Pelanggan : \nCP : \nDetail case : \nLapul/Gaul : \nStatus Nomor di DSC : \nSub Status : \nStatus Pembayaran : \nType ONT : \nCapt lightshoot : \nKATEGORI : `;
            } else if (kategori === 'template2') {
                template = `${pabx} / CASE\n\n${pabx} / NoIH / Case / HVC\nNama Pelanggan : \nCP : \nEmail : \nDetail case : \nTgl Kejadian : ${tanggalFormatted}\nOrder ID permintaan : \nStatus Order : \nSolusi yang diberikan : \nLapul/Gaul : \nCapt lightshoot : \nKATEGORI : `;
            } else if (kategori === 'template3') {
                template = `${pabx} / CASE\n\n${pabx} / NoIH / Case / HVC\nNama Pelanggan : \nCP : \nEmail : \nOrderID : \nStatus order : \nDetail case : \nTanggal kejadian : ${tanggalFormatted}\nSolusi yang diberikan : \nLapul / Gaul : \nCapt lightshoot : \nKATEGORI : \nK-Kontak : `;
            } else if (kategori === 'template4') {
                template = `${pabx} / CASE\n\n${pabx} / NoIH / Case / HVC\nNama Pelanggan : \nNIK : \nTTL : \nCP : \nEmail : \nDetail case : \nSolusi yang diberikan : \nCapt lightshoot : \nKATEGORI : `;
            } else if (kategori === 'template5') {
                template = `${pabx} / CASE\n\n${pabx} / NoIH / Case / HVC\nNama Pelanggan : \nCP : \nEmail : \nDetail case : \nOrder ID permintaan : \nFA ID : \nTanggal kejadian : ${tanggalFormatted}\nSolusi yang diberikan : \nLapul/Gaul : \nStatus Nomor di DSC : \nSub Status : \nStatus Pembayaran : \nCapt lightshoot FA : \nKATEGORI : `;
            } else if (kategori === 'template6') {
                template = `${pabx} / CASE\n\n${pabx} / NoIH / Case / HVC\nNomor IndiHome / Nomor Internet : \nNama Pelanggan : \nNIK Pelanggan : \nNo. HP Pelanggan : \nEmail Pelanggan : \nOrder ID : \nTanggal Kejadian: ${tanggalFormatted}\nKendala/inti gangguan : \nCapture Error : \nDear rekan IT Service Desk mohon bantu`;
            } else if (kategori === 'template7') {
                template = `REG/INT/CORP SILVER/DIAMOND/PLATINUM\nNama Customer : \nMSISDN-A Yang Menghubungi : ${pabx}\nMSISDN-B Yang Bermasalah : \nTanggal / Jam Kejadian : ${tanggalFormatted}\nLokasi Pelanggan (alamat) : \nSegmentasi Kartu : \nSIM Capability : \nCustomer Tier Pelanggan : \nCase Owner : Call Center Semarang\nDetail Complaint : \nAdditional Information : \nSolusi yang telah diberikan : `;
            } else if (kategori === 'template8') {
                template = `REG/INT/CORP SILVER/DIAMOND/PLATINUM\nNama Customer : \nMSISDN-A Yang Menghubungi : ${pabx}\nMSISDN-B Yang Bermasalah : \nTanggal / Jam Kejadian : ${tanggalFormatted}\nLokasi Pelanggan (alamat) : \nKoordinat customer : \nSegmentasi Kartu : \nSIM Capability : \nCustomer Tier Pelanggan : \nCase Owner : Call Center Semarang\nDetail Complaint : \nAdditional Information : \nCapture bukti pelanggan : \nCapture CCA : \nHasil analisa CCA : \nPossible root Cause : \nRemarks : \nSuggestion : \nSolusi yang telah diberikan : `;
            } else if (kategori === 'template9') {
                template = `${pabx} / CASE\n\nPelapor : \nEmail : \nCP : \n#LocationIncident\nProvinsi : \nKota / Kab : \nKecamatan : \nKelurahan : \nWitel : \nNama Jalan : \nPatokan : \nDeskripsi : `;
            }

            document.getElementById('hasilTeks').value = template;
        }

        function clearForm() {
            document.getElementById('inputPabx').value = '';
            document.getElementById('inputTanggal').value = '';
            document.getElementById('hasilTeks').value = '';
            document.getElementById('inputPabx').focus();
        }

        // ==========================================
        // FUNGSI TAB 2: FORMAT KOMPULIR
        // ==========================================
        const dataKompulir = {
            "1": "\n\nNIK SIAD :\nAninumber :\nNOMOR PELANGGAN :\nNama Pelanggan :\nTempat Lahir :\nTanggal Lahir :\nNomor Handphone di DSC :\nEmail :\nNIK Yang Tertera di Kontrak :\nNIK Yang Sesuai KTP :\nKETERANGAN PERMINTAAN ORDER PELANGGAN (KHUSUS REQ EDIT PROFILE) :",
            "2": "\n\nSUBJEK\nPABX :\nNAMA :\nJASTEL :\nEMAIL :\nCP :\nORDER ID :\nTGL TRANSAKSI :",
            "3": "\n\nNama Agent :\nLogin :\nPABX :\nNo Indihome :\nJam Call :\nCase :\nDurasi :\nEvidence :",
            "4": "\n\nNo Jastel :\nID Tiket :\nCreated Date :",
            "5": "\n\nSubjek :\nPABX :\nNo Jastel :\nReason :",
            "6": "\n\nTgl / LoginAgent / ExtAvaya / Case / PABX / Jastel"
        };

        function getKompulir() {
            let pilihan = document.getElementById("kategoriKompulir").value;
            document.getElementById("hasilKompulir").value = dataKompulir[pilihan];
        }

        // TAMBAHAN: Logika Clear Data untuk Kompulir
        function clearKompulir() {
            document.getElementById('kategoriKompulir').selectedIndex = 0;
            document.getElementById('hasilKompulir').value = '';
        }

        // ==========================================
        // FUNGSI TAB 3: KALKULATOR & PRORATA
        // ==========================================
        const formatRp = (angka) => {
            return new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(angka);
        };

        function hitungPPN() {
            let dasar = parseFloat(document.getElementById("hargaDasar").value) || 0;
            if (dasar === 0) {
                document.getElementById("outPpn").innerText = "Rp 0";
                document.getElementById("outAdmin").innerText = "Rp 5.550";
                document.getElementById("outTotalHarga").innerText = "Rp 0";
                return;
            }
            let ppn = Math.round(dasar * 0.11);
            let admin = 5550; // Admin 5000 + PPN 11%
            let total = dasar + ppn + admin;

            document.getElementById("outPpn").innerText = formatRp(ppn);
            document.getElementById("outAdmin").innerText = formatRp(admin);
            document.getElementById("outTotalHarga").innerText = formatRp(total);
        }

        function hitungProrata() {
            function prosesProrata(idHarga, idDari, idSampai) {
                let harga = parseFloat(document.getElementById(idHarga).value) || 0;
                let dari = document.getElementById(idDari).value;
                let sampai = document.getElementById(idSampai).value;

                if (!dari || !sampai || harga === 0) return 0;

                let d1 = new Date(dari);
                let d2 = new Date(sampai);
                
                let selisihHari = Math.round((d2 - d1) / (1000 * 3600 * 24)) + 1;
                if (selisihHari <= 0) return 0;

                let hariDalamBulan = new Date(d1.getFullYear(), d1.getMonth() + 1, 0).getDate();
                return Math.round((harga / hariDalamBulan) * selisihHari);
            }

            let prorataLama = prosesProrata("hargaLama", "tglDariLama", "tglSampaiLama");
            let prorataBaru = prosesProrata("hargaBaru", "tglDariBaru", "tglSampaiBaru");
            let totalProrata = prorataLama + prorataBaru;

            document.getElementById("outProrataLama").innerText = formatRp(prorataLama);
            document.getElementById("outProrataBaru").innerText = formatRp(prorataBaru);
            document.getElementById("outTotalProrata").innerText = formatRp(totalProrata);
        }

        // TAMBAHAN: Logika Clear Data untuk Kalkulator
        function clearKalkulator() {
            // Bersihkan Input & Output Kalkulator PPN
            document.getElementById('hargaDasar').value = '';
            document.getElementById("outPpn").innerText = "Rp 0";
            document.getElementById("outAdmin").innerText = "Rp 5.550";
            document.getElementById("outTotalHarga").innerText = "Rp 0";

            // Bersihkan Input & Output Kalkulator Prorata
            document.getElementById('hargaLama').value = '';
            document.getElementById('tglDariLama').value = '';
            document.getElementById('tglSampaiLama').value = '';
            document.getElementById("outProrataLama").innerText = "Rp 0";

            document.getElementById('hargaBaru').value = '';
            document.getElementById('tglDariBaru').value = '';
            document.getElementById('tglSampaiBaru').value = '';
            document.getElementById("outProrataBaru").innerText = "Rp 0";

            document.getElementById("outTotalProrata").innerText = "Rp 0";
        }

        // ==========================================
        // FUNGSI GLOBAL: COPY TEKS
        // ==========================================
        function copyTeks(elementId) {
            const teks = document.getElementById(elementId);
            if(!teks.value) {
                alert("Belum ada teks yang bisa dicopy!");
                return;
            }
            teks.select();
            teks.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(teks.value)
                .then(() => alert("Teks berhasil disalin!"))
                .catch(err => alert("Gagal menyalin teks."));
        }
    </script>

</body>
</html>
